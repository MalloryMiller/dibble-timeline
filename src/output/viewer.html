<!DOCTYPE html>
<html lang="en">
<meta charset="UTF-8">
<title>Data Coverage Viewer</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="viewer.css">
<style>
</style>
<script src="viewer.js"></script>
<body  onload="set_ranges()">


<div id="holder">

    <div class="settings">

        <div class = "option">
            <div class="setting-title">Year 
                <span id="year"></span> 
                <input type="number" id="year-t" class="number-select" onchange="update_from_text()"> </input> 
                <select name="dataset-selector" id="dataset-selector"  onchange="update_from_text()">
                    <option value="velocities">ItsLive</option>
                    <option value="elevation">IceSAT2</option>
                    <option value="rema">REMA</option>
                </select>

            </div>
            <input class="slider parallel" type = "range" id="year-s" oninput="update()"/>
            
            <br />
        </div>

        <div class="file-bar" id="velocities-files"></div>
        <div class="file-bar" id="elevation-files"></div>
        <div class="file-bar" id="rema-files"></div>
    </div>
    <div class="image">
        <img id="image" />
    </div>

    <div class="image">
        <img id="velocity" />
    </div>
    <div class="image">
        <img id="elevation" />
http://127.0.0.1:3000/src/output/images/elevation/2023_e.png    </div>
    <div class="image">
        <img id="rema" />
    </div>

</div>

</body>
</html>
